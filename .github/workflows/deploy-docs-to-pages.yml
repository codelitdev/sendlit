name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - "apps/docs/**"
      - "packages/api-contract/**"
      - "packages/email-blocks/**"
      - "packages/email-editor/**"
      - ".github/workflows/deploy-docs-to-pages.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docs"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @sendlit/api-contract build
          pnpm --filter @sendlit/email-editor build
          pnpm --filter @sendlit/email-blocks build

      - name: Build docs site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm --filter @sendlit/docs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/docs/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
